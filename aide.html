<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="style.css">
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <title>Aide - Météo</title>
</head>
<body>
    <header>
        <a href="index.html"><img src="img/552448.png" alt="logo" id="logoMeteo"></a>
        <nav>
            <ul>
                <li><a href="index.html" class="nav">Accueil</a></li>
                <li><a href="contact.html" class="nav">Contact</a></li>
                <li><a href="aide.html" class="nav">Aide</a></li>
            </ul>
        </nav>
    </header>

    <main class="container my-5 text-start" id="app">
        <h1 class="text-center mb-5" style="font-size: 3rem;">Centre d'Aide</h1>
        
        <div class="accordion" id="faqMeteo" style="max-width: 800px; margin: auto;">
            <div class="accordion-item mb-3 border-0" style="background-color: rgba(15, 108, 120, 0.9); border-radius: 15px !important; overflow: hidden;" v-for="(item, index) in faqList" :key="index">
                <h2 class="accordion-header">
                    <button class="accordion-button collapsed fw-bold" type="button" data-bs-toggle="collapse" :data-bs-target="'#q' + index" style="background-color: transparent; color: white;">
                        {{ item.question }}
                    </button>
                </h2>
                <div :id="'q' + index" class="accordion-collapse collapse" data-bs-parent="#faqMeteo">
                    <div class="accordion-body" style="color: #d2eff0;">
                        {{ item.reponse }}
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer>
        <nav>
            <ul>
                <li><a href="index.html" class="navFoot">Accueil</a></li>
                <li><a href="contact.html" class="navFoot">Contact</a></li>
                <li><a href="aide.html" class="navFoot">Aide</a></li>
            </ul>
        </nav>
        <p>&copy; 2024 Météo. Tous droits réservés.</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        const app = Vue.createApp({
            data() {
                return {
                    // Tableau contenant des questions et réponses
                    faqList: [
                        { 
                            question: "Comment rechercher une ville ?", 
                            reponse: "Tapez simplement le nom de la ville dans la barre de recherche sur la page d'accueil et cliquez sur 'Valider' ou appuyez sur 'Entrée'." 
                        },
                        { 
                            question: "D'où proviennent les données ?", 
                            reponse: "Toutes nos données sont récupérées en temps réel via l'API OpenWeatherMap, garantissant une précision optimale." 
                        },
                        { 
                            question: "Les prévisions sont-elles disponibles sur plusieurs jours ?", 
                            reponse: "Oui, après chaque recherche, un tableau affiche automatiquement les prévisions météo pour les 5 prochains jours." 
                        }
                    ]
                };
            }
        });
        app.mount('#app');
    </script>
</body>
</html>
